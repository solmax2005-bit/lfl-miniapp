<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЛФЛ Южная</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0A1A33;--ink-2:#102C57;--blue:#1B6BFF;--blue-d:#0E54E0;
  --sky:#4DA3FF;--sky-bg:#EAF2FF;--surface:#FFFFFF;--bg:#F3F6FC;
  --line:#E7ECF5;--text:#0C1420;--muted:#6B7A90;--green:#16B364;
  --shadow:0 18px 40px -22px rgba(13,40,90,.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}

/* screens */
.screen{display:none;position:absolute;inset:0;bottom:68px;overflow-y:auto;background:var(--bg);}
.screen.active{display:block;}
.screen::-webkit-scrollbar{width:0;}

/* hero */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(145deg,var(--ink) 0%,var(--ink-2) 55%,#163b78 100%);
  color:#fff;padding:18px 20px 30px;
}
.hero .pitch{position:absolute;inset:0;opacity:.16;pointer-events:none;}
.hero .pitch:before{content:"";position:absolute;top:-40px;right:-60px;width:230px;height:230px;border:2px solid #fff;border-radius:50%;}
.hero .pitch:after{content:"";position:absolute;top:0;bottom:0;right:38%;width:2px;background:#fff;}
.jersey{position:absolute;right:8px;bottom:-22px;font-family:'Archivo';font-weight:900;font-size:180px;line-height:1;color:rgba(255,255,255,.07);letter-spacing:-6px;pointer-events:none;}
.hero-top{display:flex;align-items:center;gap:8px;position:relative;z-index:2;}
.chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);padding:5px 11px;border-radius:999px;font-size:11.5px;font-weight:600;letter-spacing:.2px;}
.chip.live{background:rgba(22,179,100,.18);border-color:rgba(22,179,100,.4);color:#7ff0b6;}
.chip .dot{width:6px;height:6px;border-radius:50%;background:#27e08a;}
.hero-id{display:flex;align-items:flex-end;gap:16px;margin-top:22px;position:relative;z-index:2;}
.avatar{width:72px;height:72px;border-radius:20px;flex:none;background:linear-gradient(145deg,#3f8bff,#1b6bff);display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:800;font-size:26px;color:#fff;box-shadow:0 10px 24px -8px rgba(27,107,255,.7);border:2px solid rgba(255,255,255,.25);}
.hero-id h1{font-family:'Archivo';font-weight:800;font-size:24px;line-height:1.05;letter-spacing:-.3px;}
.hero-id .pos{margin-top:7px;display:flex;align-items:center;gap:8px;font-size:12px;color:#a9c4f0;}
.hero-id .pos b{color:#fff;font-weight:600;}
.hero-meta{display:flex;gap:20px;margin-top:20px;position:relative;z-index:2;padding-top:16px;border-top:1px solid rgba(255,255,255,.12);}
.hero-meta div{display:flex;flex-direction:column;}
.hero-meta span{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#8aa6d6;}
.hero-meta b{font-family:'Archivo';font-weight:700;font-size:14px;margin-top:3px;}

/* stats grid */
.pad{padding:16px 16px 90px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 12px;}
.sec-head h3{font-family:'Archivo';font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text);}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:-28px;position:relative;z-index:3;}
.stat{background:var(--surface);border-radius:18px;padding:14px 15px;border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden;}
.stat .n{font-family:'Archivo';font-weight:800;font-size:32px;line-height:1;color:var(--text);letter-spacing:-1px;}
.stat.feat .n{color:var(--blue);}
.stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-top:6px;font-weight:600;}
.stat .bar{height:4px;border-radius:4px;background:var(--sky-bg);margin-top:12px;overflow:hidden;}
.stat .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--sky),var(--blue));border-radius:4px;transition:width .6s ease;}

/* clubs */
.card-block{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:6px 16px;box-shadow:var(--shadow);}
.club{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line);}
.club:last-child{border-bottom:none;}
.club .badge{width:38px;height:38px;border-radius:11px;background:var(--sky-bg);display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:700;color:var(--blue);font-size:13px;flex:none;}
.club .nm{font-weight:600;font-size:14px;color:var(--text);}
.club .yr{font-size:12px;color:var(--muted);margin-top:1px;}
.club .now{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--green);background:rgba(22,179,100,.1);padding:4px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px;flex:none;}

/* no card */
.empty-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 30px;text-align:center;gap:16px;}
.empty-card .ico{font-size:56px;}
.empty-card h2{font-family:'Archivo';font-weight:800;font-size:20px;color:var(--text);}
.empty-card p{font-size:14px;color:var(--muted);line-height:1.5;}

/* search */
.pad2{padding:18px 16px 90px;}
.h-big{font-family:'Archivo';font-weight:800;font-size:22px;color:var(--text);letter-spacing:-.3px;}
.h-sub{font-size:13px;color:var(--muted);margin-top:3px;}
.filters{display:flex;gap:8px;overflow-x:auto;padding:14px 0 6px;}
.filters::-webkit-scrollbar{height:0;}
.fchip{flex:none;padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:600;background:var(--surface);border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:all .15s;}
.fchip.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 8px 18px -8px rgba(27,107,255,.6);}
.agent{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin-top:10px;box-shadow:var(--shadow);}
.agent .av{width:44px;height:44px;border-radius:13px;flex:none;background:linear-gradient(145deg,#dce9ff,#bcd6ff);display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:700;color:var(--blue-d);font-size:15px;}
.agent .info{min-width:0;flex:1;}
.agent .info .nm{font-weight:700;font-size:14px;color:var(--text);display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.agent .info .free{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(22,179,100,.18);flex:none;}
.agent .info .meta{font-size:12px;color:var(--muted);margin-top:2px;}
.agent .write{flex:none;background:var(--sky-bg);color:var(--blue-d);border:none;font-weight:700;font-size:12px;padding:8px 13px;border-radius:11px;cursor:pointer;font-family:'Inter';text-decoration:none;display:inline-block;}
.agent .write:active{transform:scale(.96);}
.agents-list{margin-top:4px;}

/* table */
.trow{display:grid;grid-template-columns:26px 1fr 34px 34px 40px;align-items:center;gap:6px;padding:12px 4px;border-bottom:1px solid var(--line);font-size:13px;}
.trow.head{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;border-bottom:1.5px solid var(--line);padding-bottom:9px;}
.trow .rk{font-family:'Archivo';font-weight:700;color:var(--muted);}
.trow.top1 .rk,.trow.top2 .rk,.trow.top3 .rk{color:var(--blue);}
.trow .tm{display:flex;align-items:center;gap:9px;font-weight:600;color:var(--text);min-width:0;overflow:hidden;}
.trow .tm .lg{width:26px;height:26px;border-radius:8px;background:var(--sky-bg);flex:none;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-size:10px;font-weight:700;color:var(--blue);}
.trow .tm span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.trow .c{text-align:center;color:var(--muted);font-variant-numeric:tabular-nums;}
.trow .pt{text-align:center;font-family:'Archivo';font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;}
.trow.top1 .pt{color:var(--blue);}
.promo{margin-top:14px;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);}
.promo i{width:14px;height:3px;border-radius:3px;background:var(--blue);display:inline-block;}

/* profile */
.pcard{background:linear-gradient(145deg,var(--ink),#163b78);border-radius:22px;padding:20px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.pcard .av{width:58px;height:58px;border-radius:16px;background:linear-gradient(145deg,#3f8bff,#1b6bff);display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:800;font-size:20px;border:2px solid rgba(255,255,255,.25);}
.menu-item{display:flex;align-items:center;gap:14px;padding:15px 4px;border-bottom:1px solid var(--line);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.menu-item:last-child{border-bottom:none;}
.menu-item:active{opacity:.6;}
.menu-item .ic{width:38px;height:38px;border-radius:11px;background:var(--sky-bg);display:flex;align-items:center;justify-content:center;flex:none;}
.menu-item .ar{margin-left:auto;color:#c2ccdb;font-size:18px;}
.menu-item svg{width:18px;height:18px;stroke:var(--blue);}
.menu-item.danger{color:#ef5b6b;}
.menu-item.danger .ic{background:#fff0f0;}
.menu-item.danger svg{stroke:#ef5b6b;}

/* bottom nav */
.nav{
  position:fixed;left:0;right:0;bottom:0;
  background:rgba(255,255,255,.95);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(4,1fr);
  padding:10px 8px calc(10px + env(safe-area-inset-bottom));
  z-index:100;
}
.nav button{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;color:#9aa7b8;font-family:'Inter';font-size:10px;font-weight:600;-webkit-tap-highlight-color:transparent;}
.nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;}
.nav button.on{color:var(--blue);}
.nav button.on svg{stroke:var(--blue);}

/* loading */
.loader{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:14px;}
.loader::after{content:"";width:20px;height:20px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-left:10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* badge colors */
.badge-0{background:#fff3e0;color:#e65100;}
.badge-1{background:#e8f5e9;color:#2e7d32;}
.badge-2{background:#e3f2fd;color:#1565c0;}
.badge-3{background:#f3e5f5;color:#6a1b9a;}
</style>
</head>
<body>

<!-- SCREEN 1: Карточка -->
<div class="screen active" id="s-card">
  <div id="card-content"></div>
</div>

<!-- SCREEN 2: Поиск -->
<div class="screen" id="s-search">
  <div class="pad2">
    <div class="h-big">Свободные агенты</div>
    <div class="h-sub" id="agents-count">Загрузка...</div>
    <div class="filters" id="pos-filters">
      <div class="fchip on" data-pos="">Все</div>
      <div class="fchip" data-pos="Нападающий">Нападающий</div>
      <div class="fchip" data-pos="Полузащитник">Полузащитник</div>
      <div class="fchip" data-pos="Защитник">Защитник</div>
      <div class="fchip" data-pos="Вратарь">Вратарь</div>
    </div>
    <div class="agents-list" id="agents-list"><div class="loader"></div></div>
  </div>
</div>

<!-- SCREEN 3: Таблица -->
<div class="screen" id="s-table">
  <div class="pad2">
    <div class="h-big">Высший дивизион</div>
    <div class="h-sub">Тур 18 · сезон 2025/26</div>
    <div style="margin-top:16px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:4px 16px;box-shadow:var(--shadow)">
      <div class="trow head"><span>#</span><span>Команда</span><span class="c">И</span><span class="c">Р</span><span class="pt">О</span></div>
      <div class="trow top1"><span class="rk">1</span><span class="tm"><span class="lg">СМ</span><span>Спарта Москва</span></span><span class="c">17</span><span class="c">+38</span><span class="pt">45</span></div>
      <div class="trow top2"><span class="rk">2</span><span class="tm"><span class="lg">АН</span><span>Анжи</span></span><span class="c">17</span><span class="c">+24</span><span class="pt">39</span></div>
      <div class="trow top3"><span class="rk">3</span><span class="tm"><span class="lg">КО</span><span>Корсары</span></span><span class="c">17</span><span class="c">+19</span><span class="pt">35</span></div>
      <div class="trow"><span class="rk">4</span><span class="tm"><span class="lg">ВД</span><span>Видное</span></span><span class="c">17</span><span class="c">+11</span><span class="pt">31</span></div>
      <div class="trow"><span class="rk">5</span><span class="tm"><span class="lg">ДЮ</span><span>Динамо ЮГ</span></span><span class="c">17</span><span class="c">+6</span><span class="pt">28</span></div>
      <div class="trow"><span class="rk">6</span><span class="tm"><span class="lg">НГ</span><span>Нагатино</span></span><span class="c">17</span><span class="c">-2</span><span class="pt">22</span></div>
    </div>
    <div class="promo"><i></i> Топ-3 выходят в Лигу Чемпионов ЛФЛ</div>
  </div>
</div>

<!-- SCREEN 4: Профиль -->
<div class="screen" id="s-profile">
  <div class="pad2">
    <div class="pcard" id="profile-card"></div>
    <div class="sec-head" style="margin-top:20px"><h3 style="font-family:'Archivo';font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text);">Действия</h3></div>
    <div class="card-block" id="profile-actions"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="nav">
  <button class="on" data-t="s-card">
    <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 9h8M8 13h5" stroke-linecap="round"/></svg>Карточка
  </button>
  <button data-t="s-search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="M20 20l-4-4" stroke-linecap="round"/></svg>Поиск
  </button>
  <button data-t="s-table">
    <svg viewBox="0 0 24 24"><path d="M5 20V10M12 20V4M19 20v-7" stroke-linecap="round"/></svg>Таблица
  </button>
  <button data-t="s-profile">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20c1.5-4 12.5-4 14 0" stroke-linecap="round"/></svg>Профиль
  </button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const tgUser = tg.initDataUnsafe?.user;
const userId = tgUser?.id;
const API = 'https://lfl-api.solmax2005.workers.dev';

// ─── helpers ────────────────────────────────────────────────────────────────

function initials(name) {
  if (!name || name === 'Неизвестно') return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return parts[0].slice(0, 2).toUpperCase();
}

function bar(val, max) {
  return Math.min(Math.round(val / max * 100), 100) + '%';
}

function contactLink(contact, name) {
  if (!contact) return null;
  if (contact.startsWith('@')) {
    return 'https://t.me/' + contact.slice(1);
  }
  const num = parseInt(contact);
  if (!isNaN(num)) return 'tg://user?id=' + num;
  return null;
}

async function api(path, method = 'GET') {
  const r = await fetch(API + path, {method});
  return r.json();
}

// ─── Card screen ─────────────────────────────────────────────────────────────

async function loadCard() {
  const el = document.getElementById('card-content');
  if (!userId) {
    el.innerHTML = `<div class="empty-card"><div class="ico">⚽</div><h2>Открой в Telegram</h2><p>Мини-апп работает только внутри Telegram</p></div>`;
    return;
  }
  el.innerHTML = '<div class="loader"></div>';
  const d = await api('/api/me?tg_id=' + userId);
  if (!d.found) {
    el.innerHTML = `
      <div class="empty-card">
        <div class="ico">🃏</div>
        <h2>Карточки ещё нет</h2>
        <p>Создай карточку в боте — отправь боту ссылку с lfl.ru или нажми «Создать карточку»</p>
      </div>`;
    return;
  }
  renderCard(d, el);
}

function renderCard(d, el) {
  const ini = initials(d.name);
  const nameParts = d.name.split(' ');
  const shortName = nameParts.length >= 2 ? nameParts[0] + '\n' + nameParts.slice(1).join(' ') : d.name;
  const isActive = d.active === 1;
  const cards = (d.yellow_cards || 0) + (d.red_cards || 0);
  const gp = (d.goals || 0) + (d.assists || 0);
  const clubs = d.career_clubs || [];

  let clubsHtml = '';
  if (clubs.length > 0) {
    clubs.forEach((c, i) => {
      const ini2 = initials(c);
      const isCurrent = i === 0;
      clubsHtml += `
        <div class="club">
          <div class="badge">${ini2}</div>
          <div>
            <div class="nm">${esc(c)}</div>
            <div class="yr">${d.debut_year ? (isCurrent ? d.debut_year + ' — наст. время' : d.debut_year + ' — ?') : '—'}</div>
          </div>
          ${isCurrent ? '<span class="now">сейчас</span>' : ''}
        </div>`;
    });
  }

  el.innerHTML = `
    <div class="hero">
      <div class="pitch"></div>
      <div class="jersey">${nameParts[0]?.[0] || '?'}</div>
      <div class="hero-top">
        <span class="chip">${esc(d.current_club || 'Клуб')}</span>
        ${isActive ? '<span class="chip live"><span class="dot"></span>В поиске</span>' : ''}
      </div>
      <div class="hero-id">
        <div class="avatar">${ini}</div>
        <div>
          <h1>${esc(d.name)}</h1>
          <div class="pos"><b>${esc(d.position)}</b>${d.age ? ' · ' + d.age + ' лет' : ''}</div>
        </div>
      </div>
      <div class="hero-meta">
        ${d.debut_year ? '<div><span>Дебют</span><b>' + d.debut_year + '</b></div>' : ''}
        <div><span>Матчи</span><b>${d.matches || 0}</b></div>
        <div><span>Гол+пас</span><b>${gp}</b></div>
        ${d.lfl_url ? '<div><span>Профиль</span><b>lfl.ru</b></div>' : ''}
      </div>
    </div>
    <div class="pad">
      <div class="stats">
        <div class="stat feat">
          <div class="n">${d.goals || 0}</div><div class="l">Голы</div>
          <div class="bar"><i style="width:${bar(d.goals||0, 50)}"></i></div>
        </div>
        <div class="stat">
          <div class="n">${d.matches || 0}</div><div class="l">Матчи</div>
          <div class="bar"><i style="width:${bar(d.matches||0, 100)}"></i></div>
        </div>
        <div class="stat">
          <div class="n">${d.assists || 0}</div><div class="l">Передачи</div>
          <div class="bar"><i style="width:${bar(d.assists||0, 40)}"></i></div>
        </div>
        <div class="stat">
          <div class="n">${cards}</div><div class="l">Карточки</div>
          <div class="bar"><i style="width:${bar(cards, 20)}"></i></div>
        </div>
      </div>
      ${clubs.length > 0 ? `
      <div class="sec-head" style="margin-top:20px"><h3>Клубы карьеры</h3></div>
      <div class="card-block">${clubsHtml}</div>
      ` : ''}
    </div>`;
}

// ─── Search screen ────────────────────────────────────────────────────────────

let currentPos = '';

async function loadAgents(pos) {
  currentPos = pos;
  const list = document.getElementById('agents-list');
  const count = document.getElementById('agents-count');
  list.innerHTML = '<div class="loader"></div>';
  const agents = await api('/api/agents?position=' + encodeURIComponent(pos));
  count.textContent = agents.length + ' игрок' + plural(agents.length, '', 'а', 'ов') + ' ищут команду';

  if (agents.length === 0) {
    list.innerHTML = '<div class="empty-card"><div class="ico">🔍</div><h2>Никого нет</h2><p>Агентов по этой позиции пока нет</p></div>';
    return;
  }

  list.innerHTML = agents.map(a => {
    const ini = initials(a.name);
    const link = contactLink(a.contact, a.name);
    const gm = a.matches > 0 ? `${a.goals} гол · ${a.matches} игр` : '';
    return `
      <div class="agent">
        <div class="av">${ini}</div>
        <div class="info">
          <div class="nm">${esc(a.name)} <span class="free"></span></div>
          <div class="meta">${esc(a.position)}${a.age ? ' · ' + a.age + ' лет' : ''}${gm ? ' · ' + gm : ''}</div>
        </div>
        ${link ? `<a class="write" href="${link}" target="_blank">Написать</a>` : '<span class="write" style="opacity:.4;cursor:default">—</span>'}
      </div>`;
  }).join('');
}

function plural(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod100 >= 11 && mod100 <= 19) return many;
  if (mod10 === 1) return one;
  if (mod10 >= 2 && mod10 <= 4) return few;
  return many;
}

document.getElementById('pos-filters').addEventListener('click', e => {
  const chip = e.target.closest('.fchip');
  if (!chip) return;
  document.querySelectorAll('.fchip').forEach(c => c.classList.remove('on'));
  chip.classList.add('on');
  loadAgents(chip.dataset.pos || '');
});

// ─── Profile screen ───────────────────────────────────────────────────────────

async function loadProfile() {
  const cardEl = document.getElementById('profile-card');
  const actEl = document.getElementById('profile-actions');
  const tgName = tgUser ? (tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '')) : 'Гость';
  const tgUsername = tgUser?.username ? '@' + tgUser.username : '';
  const ini = initials(tgName);

  if (!userId) {
    cardEl.innerHTML = `<div style="font-family:'Archivo';font-weight:800;font-size:18px">Открой в Telegram</div>`;
    actEl.innerHTML = '';
    return;
  }

  const d = await api('/api/me?tg_id=' + userId);

  cardEl.innerHTML = `
    <div style="display:flex;align-items:center;gap:14px">
      <div class="av">${ini}</div>
      <div>
        <div style="font-family:'Archivo';font-weight:800;font-size:17px">${esc(tgName)}</div>
        <div style="font-size:12px;color:#a9c4f0;margin-top:3px">
          ${d.found ? esc(d.name) + ' · ' + esc(d.position) : 'Карточка не создана'}
        </div>
        ${d.found && d.lfl_url ? '<div style="font-size:11px;color:#7aa4d6;margin-top:2px">🔗 lfl.ru привязан</div>' : ''}
      </div>
    </div>`;

  const isActive = d.found && d.active === 1;
  actEl.innerHTML = `
    <div class="menu-item" id="toggle-free-btn">
      <div class="ic">
        <svg viewBox="0 0 24 24" fill="none">
          ${isActive
            ? '<path d="M12 4v16m8-8H4" stroke-linecap="round"/>'
            : '<path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>'}
        </svg>
      </div>
      ${isActive ? 'Убрать из поиска' : 'Заявить себя свободным агентом'}
      <span class="ar">›</span>
    </div>
    <div class="menu-item" id="go-card-btn">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 9h8M8 13h5" stroke-linecap="round"/></svg></div>
      Моя карточка игрока<span class="ar">›</span>
    </div>
    <div class="menu-item">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2" stroke-linecap="round"/></svg></div>
      История матчей<span class="ar" style="color:#c2ccdb">›</span>
    </div>`;

  document.getElementById('toggle-free-btn').addEventListener('click', async () => {
    if (!d.found) {
      tg.showAlert('Сначала создай карточку в боте');
      return;
    }
    const newActive = isActive ? 0 : 1;
    await api('/api/agent/toggle-free?tg_id=' + userId + '&active=' + newActive, 'POST');
    tg.showAlert(newActive ? 'Ты в поиске команды! Тебя видят тренеры.' : 'Ты убран из поиска.');
    loadProfile();
  });

  document.getElementById('go-card-btn').addEventListener('click', () => {
    switchScreen('s-card');
  });
}

// ─── Navigation ───────────────────────────────────────────────────────────────

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('on'));
  document.getElementById(id).classList.add('active');
  document.querySelector(`.nav button[data-t="${id}"]`).classList.add('on');

  if (id === 's-search' && !searchLoaded) {
    searchLoaded = true;
    loadAgents('');
  }
  if (id === 's-profile') {
    loadProfile();
  }
}

let searchLoaded = false;

document.querySelectorAll('.nav button').forEach(b => {
  b.addEventListener('click', () => switchScreen(b.dataset.t));
});

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadCard();
</script>
